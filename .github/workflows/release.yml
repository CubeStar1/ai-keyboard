name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install

      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> frontend/.env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> frontend/.env
          echo "SUPABASE_ADMIN=${{ secrets.SUPABASE_ADMIN }}" >> frontend/.env
          echo "NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}" >> frontend/.env
          echo "NEXT_PUBLIC_APP_ICON=${{ secrets.NEXT_PUBLIC_APP_ICON }}" >> frontend/.env
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> frontend/.env
          echo "NEXT_PUBLIC_MEMORY_API_URL=${{ secrets.NEXT_PUBLIC_MEMORY_API_URL }}" >> frontend/.env

      - name: Build and Publish
        run: |
          cd frontend
          pnpm run dist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
